<!-- Auth Forms Component for AI Learning Hub -->
<!-- Include this in your HTML where you want the auth forms to appear -->

<!-- Login/Register Modal -->
<div id="auth-modal" class="auth-modal" role="dialog" aria-modal="true" aria-labelledby="auth-title" hidden>
    <div class="auth-modal-overlay" data-close-modal></div>
    <div class="auth-modal-container">
        <button class="auth-modal-close" data-close-modal aria-label="Close">&times;</button>
        
        <!-- Login Form -->
        <form id="login-form" class="auth-form" novalidate>
            <h2 id="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Sign in to continue learning</p>
            
            <div class="auth-tabs" role="tablist" aria-label="Authentication mode">
                <button type="button" role="tab" aria-selected="true" data-tab="login" class="auth-tab active">Login</button>
                <button type="button" role="tab" aria-selected="false" data-tab="register" class="auth-tab">Register</button>
            </div>
            
            <div class="auth-form-panel" data-panel="login" role="tabpanel">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" name="email" required autocomplete="email" placeholder="you@example.com">
                    <span class="form-error" aria-live="polite"></span>
                </div>
                
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" name="password" required autocomplete="current-password" placeholder="Enter your password">
                        <button type="button" class="password-toggle" aria-label="Show password" data-toggle-password>
                            <span class="eye-icon" aria-hidden="true">👁</span>
                        </button>
                    </div>
                    <span class="form-error" aria-live="polite"></span>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" name="remember" id="remember-me">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-link" data-forgot-password>Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg btn-block auth-submit">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader hidden" aria-hidden="true"></span>
                </button>
                
                <p class="auth-divider"><span>or continue with</span></p>
                
                <div class="oauth-buttons">
                    <button type="button" class="btn btn-secondary btn-icon oauth-btn" data-provider="google" aria-label="Sign in with Google">
                        <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    </button>
                    <button type="button" class="btn btn-secondary btn-icon oauth-btn" data-provider="github" aria-label="Sign in with GitHub">
                        <svg class="github-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
                    </button>
                </div>
            </div>
            
            <!-- Register Form Panel -->
            <div class="auth-form-panel hidden" data-panel="register" role="tabpanel" hidden>
                <div class="form-group">
                    <label for="register-username">Username</label>
                    <input type="text" id="register-username" name="username" required autocomplete="username" minlength="3" maxlength="20" pattern="[a-zA-Z0-9_]+" placeholder="Choose a username">
                    <span class="form-error" aria-live="polite"></span>
                    <span class="form-hint">3-20 characters, letters, numbers, underscore only</span>
                </div>
                
                <div class="form-group">
                    <label for="register-fullname">Full Name</label>
                    <input type="text" id="register-fullname" name="fullName" required autocomplete="name" placeholder="Your name">
                    <span class="form-error" aria-live="polite"></span>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="register-age">Age</label>
                        <input type="number" id="register-age" name="age" required min="12" max="18" placeholder="15">
                        <span class="form-error" aria-live="polite"></span>
                    </div>
                    <div class="form-group">
                        <label for="register-grade">Grade</label>
                        <select id="register-grade" name="gradeLevel" required>
                            <option value="">Select grade</option>
                            <option value="6">6th Grade</option>
                            <option value="7">7th Grade</option>
                            <option value="8">8th Grade</option>
                            <option value="9">9th Grade</option>
                            <option value="10">10th Grade</option>
                            <option value="11">11th Grade</option>
                            <option value="12">12th Grade</option>
                        </select>
                        <span class="form-error" aria-live="polite"></span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" name="email" required autocomplete="email" placeholder="you@example.com">
                    <span class="form-error" aria-live="polite"></span>
                </div>
                
                <div class="form-group">
                    <label for="register-password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="register-password" name="password" required autocomplete="new-password" minlength="8" placeholder="At least 8 characters">
                        <button type="button" class="password-toggle" aria-label="Show password" data-toggle-password>
                            <span class="eye-icon" aria-hidden="true">👁</span>
                        </button>
                    </div>
                    <div class="password-strength" aria-live="polite" hidden>
                        <div class="strength-bar"><span class="strength-fill"></span></div>
                        <span class="strength-text"></span>
                    </div>
                    <span class="form-error" aria-live="polite"></span>
                </div>
                
                <div class="form-group">
                    <label for="register-confirm">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="register-confirm" name="confirmPassword" required autocomplete="new-password" placeholder="Confirm your password">
                        <button type="button" class="password-toggle" aria-label="Show password" data-toggle-password>
                            <span class="eye-icon" aria-hidden="true">👁</span>
                        </button>
                    </div>
                    <span class="form-error" aria-live="polite"></span>
                </div>
                
                <div class="form-group terms-group">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" name="terms" id="agree-terms" required>
                        <span class="checkmark"></span>
                        I agree to the <a href="#" data-terms>Terms of Service</a> and <a href="#" data-privacy>Privacy Policy</a>
                    </label>
                    <span class="form-error" aria-live="polite"></span>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg btn-block auth-submit">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader hidden" aria-hidden="true"></span>
                </button>
                
                <p class="auth-divider"><span>or continue with</span></p>
                
                <div class="oauth-buttons">
                    <button type="button" class="btn btn-secondary btn-icon oauth-btn" data-provider="google" aria-label="Sign up with Google">
                        <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    </button>
                    <button type="button" class="btn btn-secondary btn-icon oauth-btn" data-provider="github" aria-label="Sign up with GitHub">
                        <svg class="github-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
                    </button>
                </div>
            </div>
            
            <!-- Forgot Password Panel -->
            <div class="auth-form-panel hidden" data-panel="forgot" role="tabpanel" hidden>
                <h3>Reset Your Password</h3>
                <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>
                <div class="form-group">
                    <label for="forgot-email">Email</label>
                    <input type="email" id="forgot-email" name="email" required autocomplete="email" placeholder="you@example.com">
                    <span class="form-error" aria-live="polite"></span>
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block auth-submit">
                    <span class="btn-text">Send Reset Link</span>
                    <span class="btn-loader hidden" aria-hidden="true"></span>
                </button>
                <button type="button" class="btn btn-secondary btn-block mt-3" data-back-to-login>Back to Login</button>
            </div>
        </form>
        
        <!-- Success Message -->
        <div id="auth-success" class="auth-success hidden" role="status" aria-live="polite" hidden>
            <div class="success-icon" aria-hidden="true">✓</div>
            <h3 id="success-title">Success!</h3>
            <p id="success-message"></p>
            <button type="button" class="btn btn-primary btn-block" data-close-success>Continue</button>
        </div>
    </div>
</div>

<!-- User Menu (shown when logged in) -->
<div id="user-menu" class="user-menu hidden" hidden>
    <button class="user-menu-trigger" aria-expanded="false" aria-haspopup="true" aria-label="User menu">
        <img id="user-avatar" src="" alt="" class="user-avatar" width="32" height="32">
        <span id="user-name" class="user-name"></span>
        <svg class="chevron-down" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
    </button>
    <div class="user-menu-dropdown" role="menu" hidden>
        <div class="user-menu-header">
            <img src="" alt="" class="user-avatar-lg" width="48" height="48">
            <div>
                <span class="user-name-lg"></span>
                <span class="user-email-lg"></span>
            </div>
        </div>
        <div class="user-menu-divider"></div>
        <a href="#dashboard" class="user-menu-item" role="menuitem">

            <span>Profile</span>
        </a>
        <a href="#settings" class="user-menu-item" role="menuitem">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.59-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.56.24-1.09.56-1.59.94l-2.39-.96c-.22-.07-.47 0-.59.22L2.74 8.87c-.12.21-.07.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.59.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.56-.24 1.09-.56 1.59-.94l2.39.96c.22.07.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            <span>Settings</span>

        <div class="user-menu-divider"></div>
        <button class="user-menu-item sign-out-btn" role="menuitem" data-sign-out>

            <span>Sign Out</span>
        </button>
    </div>
</div>

<style>
/* Auth Modal Styles */
.auth-modal {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--spacing-4);
}

.auth-modal[hidden] {
    display: none;
}

.auth-modal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(4px);
    animation: fade-in var(--transition-base) ease-out;
}

.auth-modal-container {
    position: relative;
    background: var(--color-bg);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-2xl);
    width: 100%;
    max-width: 440px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slide-up var(--transition-slow) ease-out;
}

.auth-modal-close {
    position: absolute;
    top: var(--spacing-4);
    right: var(--spacing-4);
    width: 36px;
    height: 36px;
    border-radius: var(--radius-full);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-size-xl);
    color: var(--color-text-muted);
    background: var(--color-bg-tertiary);
    transition: all var(--transition-fast);
    z-index: 1;
}

.auth-modal-close:hover {
    background: var(--color-border);
    color: var(--color-text);
}

.auth-form {
    padding: var(--spacing-8);
}

.auth-form h2 {
    text-align: center;
    margin-bottom: var(--spacing-1);
    font-size: var(--font-size-2xl);
}

.auth-subtitle {
    text-align: center;
    color: var(--color-text-secondary);
    margin-bottom: var(--spacing-8);
}

.auth-tabs {
    display: flex;
    background: var(--color-bg-tertiary);
    border-radius: var(--radius-lg);
    padding: var(--spacing-1);
    margin-bottom: var(--spacing-6);
}

.auth-tab {
    flex: 1;
    padding: var(--spacing-2) var(--spacing-4);
    border-radius: var(--radius-md);
    font-weight: 600;
    font-size: var(--font-size-sm);
    color: var(--color-text-secondary);
    background: transparent;
    transition: all var(--transition-fast);
}

.auth-tab:hover {
    color: var(--color-text);
}

.auth-tab.active {
    background: var(--color-bg);
    color: var(--color-primary);
    box-shadow: var(--shadow-sm);
}

.auth-form-panel {
    animation: fade-in var(--transition-base) ease-out;
}

.auth-form-panel.hidden {
    display: none;
}

.form-group {
    margin-bottom: var(--spacing-5);
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--spacing-4);
}

.form-group label {
    display: block;
    font-size: var(--font-size-sm);
    font-weight: 500;
    color: var(--color-text);
    margin-bottom: var(--spacing-2);
}

.form-group input,
.form-group select {
    width: 100%;
    padding: var(--spacing-3) var(--spacing-4);
    font-size: var(--font-size-base);
    border: 2px solid var(--color-border);
    border-radius: var(--radius-lg);
    background: var(--color-bg);
    color: var(--color-text);
    transition: all var(--transition-fast);
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
}

.form-group input::placeholder {
    color: var(--color-text-muted);
}

.form-group input.error {
    border-color: var(--color-error);
}

.form-group input.error:focus {
    box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
}

.form-error {
    display: block;
    font-size: var(--font-size-xs);
    color: var(--color-error);
    margin-top: var(--spacing-1);
    min-height: 1.25rem;
}

.form-hint {
    display: block;
    font-size: var(--font-size-xs);
    color: var(--color-text-muted);
    margin-top: var(--spacing-1);
}

.password-wrapper {
    position: relative;
}

.password-toggle {
    position: absolute;
    right: var(--spacing-3);
    top: 50%;
    transform: translateY(-50%);
    padding: var(--spacing-1);
    color: var(--color-text-muted);
    background: none;
    border: none;
    cursor: pointer;
}

.password-toggle:hover {
    color: var(--color-text);
}

.eye-icon {
    font-size: var(--font-size-base);
}

.password-strength {
    margin-top: var(--spacing-2);
}

.strength-bar {
    height: 4px;
    background: var(--color-bg-tertiary);
    border-radius: var(--radius-full);
    overflow: hidden;
}

.strength-fill {
    display: block;
    height: 100%;
    width: 0%;
    transition: all var(--transition-base);
    border-radius: var(--radius-full);
}

.strength-fill.weak { width: 25%; background: var(--color-error); }
.strength-fill.fair { width: 50%; background: var(--color-warning); }
.strength-fill.good { width: 75%; background: #3b82f6; }
.strength-fill.strong { width: 100%; background: var(--color-success); }

.strength-text {
    display: block;
    font-size: var(--font-size-xs);
    margin-top: var(--spacing-1);
    color: var(--color-text-secondary);
}

.checkbox-wrapper {
    display: flex;
    align-items: flex-start;
    gap: var(--spacing-2);
    cursor: pointer;
    font-size: var(--font-size-sm);
    color: var(--color-text-secondary);
}

.checkbox-wrapper input[type="checkbox"] {
    display: none;
}

.checkmark {
    width: 18px;
    height: 18px;
    border: 2px solid var(--color-border);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
    transition: all var(--transition-fast);
}

.checkbox-wrapper input[type="checkbox"]:checked + .checkmark {
    background: var(--color-primary);
    border-color: var(--color-primary);
}

.checkbox-wrapper input[type="checkbox"]:checked + .checkmark::after {
    content: '✓';
    color: white;
    font-size: 12px;
    font-weight: bold;
}

.checkbox-wrapper a {
    color: var(--color-primary);
    text-decoration: underline;
    text-underline-offset: 2px;
}

.form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--spacing-4);
}

.forgot-link {
    font-size: var(--font-size-sm);
    color: var(--color-primary);
}

.forgot-link:hover {
    text-decoration: underline;
}

.auth-submit {
    width: 100%;
    margin-top: var(--spacing-2);
}

.auth-submit .btn-loader {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid transparent;
